app = 'native-plant-nursery'
primary_region = 'iad'

[build]

[env]
  DB_PATH = '/data/nursery.db'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = 'nursery_data'
  destination = '/data'
